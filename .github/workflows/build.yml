name: CI Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get timestamp
        id: timestamp
        run: echo "value=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

      - name: Stage files
        run: |
          mkdir -p staging
          # Sync version/versionCode with artifact timestamp
          TIMESTAMP="${{ steps.timestamp.outputs.value }}"
          sed -i "s/^version=.*/version=ci_${TIMESTAMP}/" module.prop
          sed -i "s/^versionCode=.*/versionCode=${TIMESTAMP%%_*}/" module.prop
          rsync -a --exclude='.git/' --exclude='.github/' --exclude='.gitignore' \
            --exclude='*.zip' --exclude='*.tar.gz' --exclude='*.7z' \
            ./ staging/

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: Network_Enhance_ci_${{ steps.timestamp.outputs.value }}
          path: staging/
